<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>HealthChain IoT Simulator</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body {
            font-family: 'Inter', -apple-system, sans-serif;
            background: #0f172a;
            color: white;
            padding: 40px;
            display: flex;
            flex-direction: column;
            align-items: center;
        }
        h1 {
            color: #e91e63;
            margin-bottom: 30px;
            font-weight: 800;
            letter-spacing: -1px;
        }
        .grid {
            display: grid;
            grid-template-columns: repeat(auto-fit, minmax(300px, 1fr));
            gap: 20px;
            width: 100%;
            max-width: 1200px;
        }
        .card {
            background: #1e293b;
            padding: 24px;
            border-radius: 16px;
            border: 1px solid #334155;
            transition: all 0.3s ease;
        }
        .card.active {
            border-color: #e91e63;
            box-shadow: 0 0 20px rgba(233, 30, 99, 0.1);
        }
        .header {
            display: flex;
            justify-content: space-between;
            align-items: center;
            margin-bottom: 20px;
        }
        .id {
            font-size: 12px;
            color: #94a3b8;
            font-family: monospace;
        }
        .name {
            font-size: 18px;
            font-weight: 600;
        }
        .temp-display {
            font-size: 48px;
            font-weight: 800;
            margin: 20px 0;
            text-align: center;
        }
        .controls {
            display: flex;
            gap: 10px;
            align-items: center;
        }
        button {
            background: #e91e63;
            color: white;
            border: none;
            padding: 10px 20px;
            border-radius: 8px;
            font-weight: 600;
            cursor: pointer;
            transition: opacity 0.2s;
        }
        button:hover {
            opacity: 0.9;
        }
        button.off {
            background: #475569;
        }
        input[type="range"] {
            flex-grow: 1;
            accent-color: #e91e63;
        }
        .status-dot {
            width: 8px;
            height: 8px;
            border-radius: 50%;
            background: #475569;
        }
        .active .status-dot {
            background: #e91e63;
            box-shadow: 0 0 8px #e91e63;
        }
    </style>
</head>
<body>
    <h1>HEALTHCHAIN IOT SIMULATOR</h1>
    <div class="grid" id="device-grid"></div>

    <script>
        const socket = io();
        const grid = document.getElementById('device-grid');

        socket.on('device_update', (devices) => {
            grid.innerHTML = devices.map(d => `
                <div class="card ${d.active ? 'active' : ''}">
                    <div class="header">
                        <div>
                            <div class="id">${d.id}</div>
                            <div class="name">${d.name}</div>
                        </div>
                        <div class="status-dot"></div>
                    </div>
                    <div class="temp-display">${d.temp.toFixed(2)}°C</div>
                    <div class="controls">
                        <button class="${d.active ? '' : 'off'}" onclick="toggle('${d.id}')">
                            ${d.active ? 'STOP' : 'START'}
                        </button>
                        <input type="range" min="-10" max="40" step="0.1" value="${d.temp}" 
                               oninput="setTemp('${d.id}', this.value)">
                    </div>
                </div>
            `).join('');
        });

        function toggle(id) {
            socket.emit('toggle_device', id);
        }

        function setTemp(id, temp) {
            socket.emit('set_temp', { id, temp });
        }
    </script>
</body>
</html>
